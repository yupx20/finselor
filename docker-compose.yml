
services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: finselor_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: finselor_db
      POSTGRES_USER: finselor
      POSTGRES_PASSWORD: finselor_secret
    ports:
      - "5432:5432"
    volumes:
      - finselor_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finselor -d finselor_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build: ./backend
    container_name: finselor_backend
    restart: unless-stopped
    entrypoint: ["sh", "entrypoint.sh"]
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://finselor:finselor_secret@db:5432/finselor_db
      JWT_SECRET_KEY: finselor-dev-secret-key-change-in-production-2024
      GEMINI_API_KEY: AQ.Ab8RN6JYDoCY7h0ycGcF4WbKrXYsXPvRN3hqr1sGru9zbV7eDA
      FRONTEND_URL: http://localhost:3000
    depends_on:
      db:
        condition: service_healthy

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    container_name: finselor_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  finselor_pgdata:
    driver: local
